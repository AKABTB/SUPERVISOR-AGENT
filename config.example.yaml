# 监督助手 可读配置模板。
# 复制为 config.yaml 并按需修改。密钥不放这里(放 .env)。

llm:
  provider: deepseek                        # openai | deepseek —— 可切换
  model: deepseek-chat                      # 对应家的模型名
  base_url:                                 # 官方接口留空;走第三方 OpenAI 兼容网关时填其 base_url
  temperature: 0.3                          # 低温,人格要稳、要硬,不要发散

storage:
  db_path: data.db            # SQLite 单文件

telegram:
  # 国内连 Telegram 需走代理。填你的本地代理地址;挪到无墙服务器时留空即可。
  proxy:

supervisor:
  timezone: Asia/Shanghai     # 催收时间按此时区解析

web:
  # 简易 Web 控制台。本机自用,默认只听本地。
  # 启动:python -m supervisor web
  host: 127.0.0.1
  port: 8000
